<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />
        <link rel="stylesheet" href="css/bootstrap.min.css" />
    
        <title>#12 Grid Examples</title>
        <style>
            body {
                padding: 20px
            }
            .gray {
                background-color: #AAA;
                text-align: center;
                padding: 40px;
                border: 5px solid #FFF;
            }
        </style>
    </head>
    <body>
        <div class="container">
        
            <div class="row">
                <div class="col-12 gray">.col-12</div>
            </div>
            <!-- Rij 2 + 3 samen -->
            <div class="row">

                <!-- Linker blok -->
                <div class="col-md-4 p-0">
                    <div class="gray h-100">Blok A</div>
                </div>

                <!-- Rechter gedeelte -->
                <div class="col-md-8">

                    <!-- Bovenste helft -->
                    <div class="row">
                        <div class="col-6 gray">Blok B</div>
                        <div class="col-6 gray">Blok C</div>
                    </div>

                    <!-- Onderste helft -->
                    <div class="row">
                        <div class="col-12 gray">.col-12</div>
                    </div>

                </div>

            </div>

            <!-- Rij 4 -->
            <div class="row">
                <div class="col-12 gray">Footer</div>
            </div>

        </div>

        <script src="js/jquery.js"></script>
        <script src="js/popper.min.js"></script>
        <script src="js/bootstrap.min.js"></script>
    </body>
</html>
